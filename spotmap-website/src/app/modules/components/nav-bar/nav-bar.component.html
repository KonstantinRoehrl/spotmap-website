<nav class="nav-bar select-none">
  <ul>
    @for (link of links(); track link.name; let isLast = $last) {
      <li>
        <a
          [routerLink]="link.url"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          appGlitchText
        >
          <span class="nav-icon me-1" aria-hidden="true">{{ link.icon }}</span>
          <span class="nav-text">{{ link.name }}</span>
        </a>
      </li>
      @if (!isLast) {
        <div class="nav-separator"></div>
      }
    }
  </ul>
</nav>
