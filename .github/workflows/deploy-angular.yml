name: Deploy Angular App to GitHub Pages

on:
  push:
    branches:
      - main

# Cancel previous runs when new commits are pushed
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Angular production bundle
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js (version from .nvmrc) + npm cache
        uses: actions/setup-node@v6
        with:
          node-version-file: spotmap-website/.nvmrc
          cache: 'npm'
          cache-dependency-path: spotmap-website/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies (npm ci — clean, from lockfile)
        run: npm ci
        working-directory: spotmap-website

      - name: Build Angular app (production, base-href /spotmap-website/)
        run: npm run build:pages
        working-directory: spotmap-website

      - name: Add SPA 404 fallback (copy index.html → 404.html)
        run: cp ./dist/spotmap-website/browser/index.html ./dist/spotmap-website/browser/404.html

      - name: Upload Pages artifact (dist browser/)
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/spotmap-website/browser

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5